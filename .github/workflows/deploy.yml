name: MediVault CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script_stop: true

          script: |
            set -e

            echo "=============================="
            echo "🚀 MediVault Deployment Started"
            echo "=============================="

            cd ~/Telemedicine-and-Electronic-Health-Records-EHR-Application

            echo "📥 Fetching latest code..."
            git fetch origin

            echo "📦 Resetting to latest master..."
            git reset --hard origin/master

            echo "🧹 Cleaning unused Docker images..."
            docker image prune -f || true

            echo "🧹 Cleaning Docker builder cache..."
            docker builder prune -f || true

            echo "🔨 Building updated containers..."
            docker compose build

            echo "🚀 Starting containers..."
            docker compose up -d --remove-orphans

            echo "⏳ Waiting for services to start..."
            sleep 20

            echo "📦 Running Containers:"
            docker ps

            echo "=============================="
            echo "✅ Deployment Successful!"
            echo "=============================="
